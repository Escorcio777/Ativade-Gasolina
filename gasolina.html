<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abastecimento</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 320px;
        }

        h1 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        select, input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        #resultado {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            color: #2c7be5;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #2c7be5;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1a5edb;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>⛽ Abastecimento</h1>

    <form id="formCombustivel">
        <label>Tipo de Combustível</label>
        <select id="combustivel">
            <option value="">Selecione</option>
            <option value="gasolina">Gasolina</option>
            <option value="etanol">Etanol</option>
            <option value="diesel">Diesel</option>
        </select>

        <label>Quantidade (litros)</label>
        <input type="number" id="litros" step="0.1" min="0">

        <button type="submit">Calcular</button>
    </form>

    <div id="resultado">R$ 0,00</div>
</div>

<script src="script.js"></script>

</body>
</html>
